name: ${NEXA_COMPOSE_PROJECT_NAME:-nexa-chat-production}

x-runtime-defaults: &runtime-defaults
  init: true
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '5'

x-postgres-build: &postgres-build
  context: .
  target: postgres-runtime
  args:
    NEXA_IMAGE_SOURCE: ${NEXA_IMAGE_SOURCE:-https://github.com/cryptnetworks/NexaChat}
    NEXA_IMAGE_REVISION: ${NEXA_IMAGE_REVISION:?set NEXA_IMAGE_REVISION to the deployed commit}
    NEXA_IMAGE_VERSION: ${NEXA_IMAGE_VERSION:?set NEXA_IMAGE_VERSION to an immutable release identifier}

x-server-build: &server-build
  context: .
  target: server-runtime
  args:
    NEXA_IMAGE_SOURCE: ${NEXA_IMAGE_SOURCE:-https://github.com/cryptnetworks/NexaChat}
    NEXA_IMAGE_REVISION: ${NEXA_IMAGE_REVISION:?set NEXA_IMAGE_REVISION to the deployed commit}
    NEXA_IMAGE_VERSION: ${NEXA_IMAGE_VERSION:?set NEXA_IMAGE_VERSION to an immutable release identifier}

x-object-storage-build: &object-storage-build
  context: .
  target: object-storage-runtime
  args:
    NEXA_IMAGE_SOURCE: ${NEXA_IMAGE_SOURCE:-https://github.com/cryptnetworks/NexaChat}
    NEXA_IMAGE_REVISION: ${NEXA_IMAGE_REVISION:?set NEXA_IMAGE_REVISION to the deployed commit}
    NEXA_IMAGE_VERSION: ${NEXA_IMAGE_VERSION:?set NEXA_IMAGE_VERSION to an immutable release identifier}

x-backup-build: &backup-build
  context: .
  target: backup-runtime
  args:
    NEXA_IMAGE_SOURCE: ${NEXA_IMAGE_SOURCE:-https://github.com/cryptnetworks/NexaChat}
    NEXA_IMAGE_REVISION: ${NEXA_IMAGE_REVISION:?set NEXA_IMAGE_REVISION to the deployed commit}
    NEXA_IMAGE_VERSION: ${NEXA_IMAGE_VERSION:?set NEXA_IMAGE_VERSION to an immutable release identifier}

x-server-environment: &server-environment
  NODE_ENV: production
  NEXA_DEPLOYMENT_PROFILE: single-host-private
  NEXA_PUBLIC_URL: ${NEXA_PUBLIC_ORIGIN:?set NEXA_PUBLIC_ORIGIN to the exact public HTTPS origin}
  NEXA_WEB_ORIGIN: ${NEXA_PUBLIC_ORIGIN:?set NEXA_PUBLIC_ORIGIN to the exact public HTTPS origin}
  NEXA_TRUSTED_PROXY_CIDRS: ${NEXA_EDGE_ADDRESS:-172.30.0.10}/32
  NEXA_SERVER_HOST: 0.0.0.0
  NEXA_SERVER_PORT: '3000'
  NEXA_SERVER_BODY_LIMIT_BYTES: '16384'
  NEXA_SERVER_SHUTDOWN_TIMEOUT_MS: '15000'
  NEXA_SECURE_COOKIES: 'true'
  NEXA_ENABLE_DEV_AUTH: 'false'
  NEXA_LOG_LEVEL: ${NEXA_LOG_LEVEL:-info}
  NEXA_TRACE_SAMPLE_RATE: ${NEXA_TRACE_SAMPLE_RATE:-0.01}
  DATABASE_URL_FILE: /run/secrets/database_url
  NEXA_COORDINATION_ENABLED: 'true'
  REDIS_URL_FILE: /run/secrets/redis_url
  NEXA_OBJECT_STORAGE_ENABLED: 'true'
  NEXA_OBJECT_STORAGE_CREATE_BUCKET: 'false'
  S3_ENDPOINT: http://object-storage:8333
  S3_ACCESS_KEY_FILE: /run/secrets/s3_access_key
  S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
  S3_BUCKET: ${NEXA_S3_BUCKET:-nexa-attachments}
  S3_REGION: ${NEXA_S3_REGION:-us-east-1}

services:
  postgres:
    <<: *runtime-defaults
    image: ${NEXA_POSTGRES_IMAGE:-nexa-chat-postgres}:${NEXA_IMAGE_TAG:?set NEXA_IMAGE_TAG to an immutable release identifier}
    build: *postgres-build
    user: '70:70'
    environment:
      POSTGRES_DB: nexa
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    tmpfs:
      - /run/postgresql:rw,noexec,nosuid,nodev,uid=70,gid=70,mode=0750,size=1m
      - /tmp:rw,noexec,nosuid,nodev,uid=70,gid=70,mode=0700,size=16m
    networks: [backend]
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -q -U nexa -d nexa']
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    stop_grace_period: 60s
    pids_limit: 200
    ulimits:
      nofile: { soft: 1024, hard: 4096 }
    deploy:
      resources:
        limits: { cpus: '1.00', memory: 1G, pids: 200 }
        reservations: { cpus: '0.10', memory: 128M }

  valkey:
    <<: *runtime-defaults
    image: valkey/valkey:8.1.8-alpine3.23@sha256:94365b275456ae14621001c03556c732b1d93a0cdeacc317d1bdd52eba680885
    user: '999:999'
    entrypoint: [/bin/sh, -euc]
    command:
      - |
        umask 077
        password="$$(cat /run/secrets/valkey_password)"
        case "$$password" in
          *[!A-Za-z0-9_-]*|'') echo 'invalid Valkey credential' >&2; exit 1 ;;
        esac
        printf '%s\n' \
          'bind 0.0.0.0' \
          'protected-mode yes' \
          'port 6379' \
          'tcp-backlog 128' \
          'timeout 0' \
          'tcp-keepalive 300' \
          'daemonize no' \
          'supervised no' \
          'loglevel notice' \
          'databases 16' \
          'always-show-logo no' \
          'appendonly yes' \
          'appendfsync everysec' \
          'maxmemory 192mb' \
          'maxmemory-policy noeviction' \
          'maxclients 1000' \
          'dir /data' > /run/valkey/valkey.conf
        printf 'requirepass %s\n' "$$password" >> /run/valkey/valkey.conf
        unset password
        exec valkey-server /run/valkey/valkey.conf
    secrets: [valkey_password]
    volumes:
      - valkey-data:/data
    tmpfs:
      - /run/valkey:rw,noexec,nosuid,nodev,uid=999,gid=999,mode=0700,size=1m
      - /tmp:rw,noexec,nosuid,nodev,uid=999,gid=999,mode=0700,size=4m
    networks: [backend]
    healthcheck:
      test:
        [
          CMD-SHELL,
          'test "$$(REDISCLI_AUTH="$$(cat /run/secrets/valkey_password)" valkey-cli --no-auth-warning ping)" = PONG',
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    stop_grace_period: 30s
    pids_limit: 100
    ulimits:
      nofile: { soft: 1024, hard: 4096 }
    deploy:
      resources:
        limits: { cpus: '0.50', memory: 256M, pids: 100 }
        reservations: { cpus: '0.05', memory: 32M }

  object-storage:
    <<: *runtime-defaults
    image: ${NEXA_OBJECT_STORAGE_IMAGE:-nexa-chat-object-storage}:${NEXA_IMAGE_TAG:?set NEXA_IMAGE_TAG to an immutable release identifier}
    build: *object-storage-build
    entrypoint: [/bin/sh, -euc]
    command:
      - |
        umask 077
        access_key="$$(cat /run/secrets/s3_access_key)"
        secret_key="$$(cat /run/secrets/s3_secret_key)"
        case "$$access_key" in *[!A-Za-z0-9_-]*|'') echo 'invalid object-storage credential' >&2; exit 1 ;; esac
        case "$$secret_key" in *[!A-Za-z0-9_-]*|'') echo 'invalid object-storage credential' >&2; exit 1 ;; esac
        case "$${S3_BUCKET}" in
          [a-z0-9][a-z0-9-]*[a-z0-9]) ;;
          *) echo 'invalid object-storage bucket' >&2; exit 1 ;;
        esac
        bucket_length="$${#S3_BUCKET}"
        if [ "$$bucket_length" -lt 3 ] || [ "$$bucket_length" -gt 63 ]; then
          echo 'invalid object-storage bucket' >&2
          exit 1
        fi
        printf '%s\n' \
          '{"identities":[{"name":"nexa-chat","credentials":[{"accessKey":"'"$$access_key"'","secretKey":"'"$$secret_key"'"}],"actions":["Read:'"$${S3_BUCKET}"'","List:'"$${S3_BUCKET}"'","Tagging:'"$${S3_BUCKET}"'","Write:'"$${S3_BUCKET}"'"]}]}' \
          > /tmp/s3-config.json
        unset access_key secret_key bucket_length
        exec /entrypoint.sh mini -dir=/data -bucket="$${S3_BUCKET}" \
          -s3.config=/tmp/s3-config.json -s3.port=8333 -s3.port.iceberg=0 \
          -webdav=false -admin.ui=false -master.telemetry=false -metricsPort=0
    environment:
      HOME: /tmp
      S3_BUCKET: ${NEXA_S3_BUCKET:-nexa-attachments}
    secrets: [s3_access_key, s3_secret_key]
    volumes:
      - object-storage-data:/data
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=1000,gid=1000,mode=0700,size=64m
    networks: [backend]
    healthcheck:
      test: [CMD, wget, --quiet, --spider, http://127.0.0.1:8333/healthz]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    stop_grace_period: 30s
    pids_limit: 200
    ulimits:
      nofile: { soft: 1024, hard: 4096 }
    deploy:
      resources:
        limits: { cpus: '1.00', memory: 1G, pids: 200 }
        reservations: { cpus: '0.10', memory: 128M }

  migrate:
    <<: *runtime-defaults
    image: ${NEXA_SERVER_IMAGE:-nexa-chat-server}:${NEXA_IMAGE_TAG:?set NEXA_IMAGE_TAG to an immutable release identifier}
    build: *server-build
    restart: 'no'
    command: [node, /app/server/migrate.mjs]
    environment: *server-environment
    secrets: [database_url, redis_url, s3_access_key, s3_secret_key]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=1000,gid=1000,mode=0700,size=16m
    networks: [backend]
    depends_on:
      postgres: { condition: service_healthy }
      valkey: { condition: service_healthy }
      object-storage: { condition: service_healthy }
    stop_signal: SIGTERM
    stop_grace_period: 60s
    pids_limit: 100
    ulimits:
      nofile: { soft: 1024, hard: 4096 }
    deploy:
      resources:
        limits: { cpus: '0.50', memory: 512M, pids: 100 }
        reservations: { cpus: '0.05', memory: 64M }

  server:
    <<: *runtime-defaults
    image: ${NEXA_SERVER_IMAGE:-nexa-chat-server}:${NEXA_IMAGE_TAG:?set NEXA_IMAGE_TAG to an immutable release identifier}
    build: *server-build
    environment: *server-environment
    secrets: [database_url, redis_url, s3_access_key, s3_secret_key]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=1000,gid=1000,mode=0700,size=64m
    networks:
      frontend:
        ipv4_address: ${NEXA_SERVER_ADDRESS:-172.30.0.11}
      backend: {}
    depends_on:
      postgres: { condition: service_healthy }
      valkey: { condition: service_healthy }
      object-storage: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test:
        [
          CMD,
          wget,
          --quiet,
          --tries=1,
          --spider,
          http://127.0.0.1:3000/health/ready,
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    stop_signal: SIGTERM
    stop_grace_period: 20s
    pids_limit: 200
    ulimits:
      nofile: { soft: 1024, hard: 4096 }
    deploy:
      resources:
        limits: { cpus: '1.00', memory: 1G, pids: 200 }
        reservations: { cpus: '0.10', memory: 128M }

  edge:
    <<: *runtime-defaults
    image: ${NEXA_EDGE_IMAGE:-nexa-chat-edge}:${NEXA_IMAGE_TAG:?set NEXA_IMAGE_TAG to an immutable release identifier}
    build:
      context: .
      target: web-runtime
      args:
        NEXA_IMAGE_SOURCE: ${NEXA_IMAGE_SOURCE:-https://github.com/cryptnetworks/NexaChat}
        NEXA_IMAGE_REVISION: ${NEXA_IMAGE_REVISION:?set NEXA_IMAGE_REVISION to the deployed commit}
        NEXA_IMAGE_VERSION: ${NEXA_IMAGE_VERSION:?set NEXA_IMAGE_VERSION to an immutable release identifier}
    ports:
      - ${NEXA_HTTPS_BIND_ADDRESS:-0.0.0.0}:${NEXA_HTTPS_PORT:-443}:8443
    secrets: [tls_cert, tls_key]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700,size=64m
    networks:
      frontend:
        ipv4_address: ${NEXA_EDGE_ADDRESS:-172.30.0.10}
    depends_on:
      server: { condition: service_healthy }
    healthcheck:
      test:
        [
          CMD,
          wget,
          --quiet,
          --tries=1,
          --no-check-certificate,
          --spider,
          https://127.0.0.1:8443/health/live,
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    stop_signal: SIGQUIT
    stop_grace_period: 20s
    pids_limit: 100
    ulimits:
      nofile: { soft: 1024, hard: 4096 }
    deploy:
      resources:
        limits: { cpus: '0.50', memory: 256M, pids: 100 }
        reservations: { cpus: '0.05', memory: 32M }

  backup:
    <<: *runtime-defaults
    profiles: [operations]
    image: ${NEXA_BACKUP_IMAGE:-nexa-chat-backup}:${NEXA_IMAGE_TAG:?set NEXA_IMAGE_TAG to an immutable release identifier}
    build: *backup-build
    user: ${NEXA_BACKUP_UID:-1000}:${NEXA_BACKUP_GID:-1000}
    restart: 'no'
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      S3_ENDPOINT: http://object-storage:8333
      S3_ACCESS_KEY_FILE: /run/secrets/s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/s3_secret_key
      S3_BUCKET: ${NEXA_S3_BUCKET:-nexa-attachments}
      S3_REGION: ${NEXA_S3_REGION:-us-east-1}
      NEXA_BACKUP_KEY_FILE: /run/secrets/backup_encryption_key
      NEXA_BACKUP_KEY_ID: ${NEXA_BACKUP_KEY_ID:-operator-managed}
      NEXA_BACKUP_DIR: /backups
      NEXA_BACKUP_MODE: ${NEXA_BACKUP_MODE:-}
      NEXA_RECOVERY_MODE: ${NEXA_RECOVERY_MODE:-}
      NEXA_RECOVERY_ALLOW_COMPATIBLE_REVISION: ${NEXA_RECOVERY_ALLOW_COMPATIBLE_REVISION:-}
      NEXA_IMAGE_REVISION: ${NEXA_IMAGE_REVISION:?set NEXA_IMAGE_REVISION to the deployed commit}
      NEXA_IMAGE_VERSION: ${NEXA_IMAGE_VERSION:?set NEXA_IMAGE_VERSION to an immutable release identifier}
      NEXA_MAX_SCHEMA_VERSION: '45'
      NEXA_BACKUP_RETENTION_DAYS: ${NEXA_BACKUP_RETENTION_DAYS:-30}
      NEXA_BACKUP_RETENTION_COUNT: ${NEXA_BACKUP_RETENTION_COUNT:-7}
      NEXA_BACKUP_INCOMPLETE_HOURS: ${NEXA_BACKUP_INCOMPLETE_HOURS:-24}
      NEXA_BACKUP_MAX_OBJECT_BYTES: ${NEXA_BACKUP_MAX_OBJECT_BYTES:-67108864}
    secrets: [database_url, s3_access_key, s3_secret_key, backup_encryption_key]
    volumes:
      - type: bind
        source: ${NEXA_BACKUP_DIR:-/srv/nexa-chat/backups}
        target: /backups
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777,size=16m
    networks: [backend]
    depends_on:
      postgres: { condition: service_healthy }
      object-storage: { condition: service_healthy }
    stop_signal: SIGTERM
    stop_grace_period: 60s
    pids_limit: 100
    ulimits:
      nofile: { soft: 1024, hard: 4096 }
    deploy:
      resources:
        limits: { cpus: '1.00', memory: 512M, pids: 100 }
        reservations: { cpus: '0.05', memory: 64M }

networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: ${NEXA_FRONTEND_SUBNET:-172.30.0.0/24}
  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${NEXA_BACKEND_SUBNET:-172.31.0.0/24}

volumes:
  postgres-data:
  valkey-data:
  object-storage-data:

secrets:
  postgres_password:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/postgres_password
  database_url:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/database_url
  valkey_password:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/valkey_password
  redis_url:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/redis_url
  s3_access_key:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/s3_access_key
  s3_secret_key:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/s3_secret_key
  tls_cert:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/tls_cert.pem
  tls_key:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/tls_key.pem
  backup_encryption_key:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/backup_encryption_key
