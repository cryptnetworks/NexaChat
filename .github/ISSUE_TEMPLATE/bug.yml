name: Bug report
description: Report a reproducible defect
body:
  - type: textarea
    id: problem
    attributes:
      {
        label: Problem,
        description: Describe what happened and what you expected.,
      }
    validations: { required: true }
  - type: textarea
    id: reproduce
    attributes:
      {
        label: Reproduction,
        description: Provide minimal steps and relevant logs with private data removed.,
      }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: Version and environment }
    validations: { required: true }
  - type: textarea
    id: impact
    attributes: { label: Security, privacy, accessibility, or data impact }
