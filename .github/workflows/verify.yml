name: Verify
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_TEST_URL: postgresql://nexa:ci-only-password@127.0.0.1:5432/nexa
    services:
      postgres:
        image: postgres:17.9-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
        env:
          POSTGRES_DB: nexa
          POSTGRES_USER: nexa
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexa -d nexa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Generate software bill of materials
        run: npm sbom --sbom-format cyclonedx > nexa-chat.cdx.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: nexa-chat.cdx.json }
