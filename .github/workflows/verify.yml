name: Verify
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Generate software bill of materials
        run: npm sbom --sbom-format cyclonedx > nexa-chat.cdx.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: nexa-chat.cdx.json }
