name: Release candidate evidence

on:
  workflow_dispatch:
    inputs:
      candidate_id:
        description: Version, channel, and positive attempt (for example 0.2.0-beta.1)
        required: true
        type: string
      channel:
        description: Isolated release channel
        required: true
        type: choice
        options: [beta, stable, nightly]
      expected_commit:
        description: Full lowercase commit object ID selected for the run
        required: true
        type: string
      source_date_epoch:
        description: Reviewed UTC build epoch in seconds
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ inputs.candidate_id }}-${{ inputs.expected_commit }}
  cancel-in-progress: false

jobs:
  input-gate:
    name: Validate dispatch identity
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      CANDIDATE_ID: ${{ inputs.candidate_id }}
      CANDIDATE_CHANNEL: ${{ inputs.channel }}
      EXPECTED_COMMIT: ${{ inputs.expected_commit }}
      DISPATCH_COMMIT: ${{ github.sha }}
      SOURCE_DATE_EPOCH: ${{ inputs.source_date_epoch }}
    steps:
      - name: Reject mutable or malformed inputs before checkout
        run: |
          node --input-type=module -e '
            const expected = process.env.EXPECTED_COMMIT ?? "";
            const actual = process.env.DISPATCH_COMMIT ?? "";
            const epoch = process.env.SOURCE_DATE_EPOCH ?? "";
            const candidate = process.env.CANDIDATE_ID ?? "";
            const channel = process.env.CANDIDATE_CHANNEL ?? "";
            if (!/^[0-9a-f]{40}$/.test(expected) || expected !== actual) process.exit(1);
            if (!/^[1-9][0-9]{8,9}$/.test(epoch)) process.exit(1);
            if (!/^[0-9A-Za-z.+-]{1,90}$/.test(candidate) || !new RegExp(`-${channel}\\.[1-9][0-9]*$`).test(candidate)) process.exit(1);
          '

  source-gates:
    name: Source, service, and recovery gates
    needs: input-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      DATABASE_TEST_URL: postgresql://nexa:ci-only-password@127.0.0.1:5432/nexa
      COORDINATION_TEST_URL: redis://127.0.0.1:6379
      NEXA_RT_VALKEY_URL: redis://127.0.0.1:6379
      CANDIDATE_ID: ${{ inputs.candidate_id }}
      CANDIDATE_CHANNEL: ${{ inputs.channel }}
      EXPECTED_COMMIT: ${{ inputs.expected_commit }}
      SOURCE_DATE_EPOCH: ${{ inputs.source_date_epoch }}
    services:
      postgres:
        image: postgres:17.10-alpine3.23@sha256:8189a1f6e40904781fc9e2612687877791d21679866db58b1de996b31fc312e4
        env:
          POSTGRES_DB: nexa
          POSTGRES_USER: nexa
          POSTGRES_PASSWORD: ci-only-password
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nexa -d nexa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8.1.9-alpine3.24@sha256:a038175878d66b9d274fbf8be73c0305e93798b83917647f167e18cef3c71eec
        ports: ['6379:6379']
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          ref: ${{ inputs.expected_commit }}

      - name: Validate immutable candidate inputs
        run: |
          node --input-type=module -e '
            const expected = process.env.EXPECTED_COMMIT ?? "";
            const actual = process.env.GITHUB_SHA ?? "";
            const epoch = process.env.SOURCE_DATE_EPOCH ?? "";
            if (!/^[0-9a-f]{40}$/.test(expected) || expected !== actual) process.exit(1);
            if (!/^[1-9][0-9]{8,9}$/.test(epoch)) process.exit(1);
          '

      - name: Set up pinned Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: npm

      - name: Set up pinned npm and dependencies
        run: |
          npm install --global npm@11.16.0
          npm ci

      - name: Validate release policies
        run: |
          npm run release:check
          npm run release:candidate -- policy
          npm run release:support -- policy
          npm run release:update-recovery -- policy
          npm run release:upgrade -- policy

      - name: Verify formatting, lint, and types
        run: |
          npm run format:check
          npm run lint
          npm run typecheck

      - name: Run architecture and contract tests
        run: |
          npm run test:architecture
          npm run test:contracts

      - name: Run complete unit and PostgreSQL integration suite
        run: npm test

      - name: Build production workspaces
        run: npm run build

      - name: Audit production dependency graph
        run: npm audit --audit-level=high

      - name: Exercise storage and job failure recovery
        run: |
          npm run test:resilience
          npm run test:resilience:integration

      - name: Enforce API performance budgets
        run: npm run test:performance

      - name: Exercise real-time capacity and replica coordination
        run: |
          npm run test:realtime-capacity
          npm run test:realtime-capacity:valkey

      - name: Verify clean install and dependency recovery
        run: npm run verify:clean-env

      - name: Record bounded source environment evidence
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          mkdir -p candidate-evidence/source
          (node --version || echo unavailable) > candidate-evidence/source/node-version.txt
          (npm --version || echo unavailable) > candidate-evidence/source/npm-version.txt
          (rustc --version || echo unavailable) > candidate-evidence/source/rust-version.txt
          (cargo --version || echo unavailable) > candidate-evidence/source/cargo-version.txt
          node --input-type=module -e '
            import { createHash } from "node:crypto";
            import { readFileSync, writeFileSync } from "node:fs";
            import { release, version } from "node:os";
            const digest = (path) => createHash("sha256").update(readFileSync(path)).digest("hex");
            const captured = (name) => readFileSync(`candidate-evidence/source/${name}-version.txt`, "utf8").trim();
            const record = {
              schemaVersion: 1,
              candidateId: process.env.CANDIDATE_ID,
              channel: process.env.CANDIDATE_CHANNEL,
              commit: process.env.GITHUB_SHA,
              sourceDateEpoch: Number(process.env.SOURCE_DATE_EPOCH),
              runner: { os: process.env.RUNNER_OS, arch: process.env.RUNNER_ARCH, image: process.env.ImageOS ?? "unknown", imageVersion: process.env.ImageVersion ?? "unknown" },
              environment: { osRelease: release(), osVersion: version(), node: captured("node"), npm: captured("npm"), rust: captured("rust"), cargo: captured("cargo") },
              services: {
                postgres: "17.10-alpine3.23",
                coordination: { provider: "Valkey", image: "8.1.9-alpine3.24" }
              },
              locks: [
                { path: "apps/desktop/src-tauri/Cargo.lock", sha256: digest("apps/desktop/src-tauri/Cargo.lock") },
                { path: "package-lock.json", sha256: digest("package-lock.json") }
              ],
              conclusion: process.env.JOB_STATUS
            };
            writeFileSync("candidate-evidence/source/environment.json", `${JSON.stringify(record, null, 2)}\n`, { flag: "wx" });
          '

      - name: Retain source evidence for transfer to the restricted archive
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: candidate-${{ inputs.candidate_id }}-source-${{ github.run_attempt }}
          path: candidate-evidence/source
          if-no-files-found: error
          retention-days: 90

  desktop-matrix:
    name: Desktop ${{ matrix.platform }}/${{ matrix.arch }}
    needs: source-gates
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-24.04
          - platform: macos
            arch: arm64
            runner: macos-15
          - platform: macos
            arch: x64
            runner: macos-15-intel
          - platform: windows
            arch: x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    env:
      CANDIDATE_ID: ${{ inputs.candidate_id }}
      CANDIDATE_CHANNEL: ${{ inputs.channel }}
      EXPECTED_COMMIT: ${{ inputs.expected_commit }}
      SOURCE_DATE_EPOCH: ${{ inputs.source_date_epoch }}
      TARGET_PLATFORM: ${{ matrix.platform }}
      TARGET_ARCH: ${{ matrix.arch }}
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          ref: ${{ inputs.expected_commit }}

      - name: Install Linux desktop prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends build-essential curl file libayatana-appindicator3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev libxdo-dev wget

      - name: Set up pinned Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install pinned dependencies
        shell: bash
        run: |
          npm install --global npm@11.16.0
          npm ci
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          cargo --version

      - name: Test desktop process boundaries
        run: npm run test:desktop

      - name: Exercise signed update and rollback recovery
        shell: bash
        run: |
          mkdir -p candidate-evidence/target
          npm run test:update-recovery
          npm run release:update-recovery -- evidence --expected-commit="$EXPECTED_COMMIT" > candidate-evidence/target/update-recovery.json

      - name: Test and lint native shell
        shell: bash
        run: |
          cargo test --locked --manifest-path apps/desktop/src-tauri/Cargo.toml
          cargo clippy --locked --manifest-path apps/desktop/src-tauri/Cargo.toml -- -D warnings

      - name: Produce unsigned candidate package
        run: npm run desktop:package

      - name: Record bounded target environment evidence
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          mkdir -p candidate-evidence/target
          (node --version || echo unavailable) > candidate-evidence/target/node-version.txt
          (npm --version || echo unavailable) > candidate-evidence/target/npm-version.txt
          (rustc --version || echo unavailable) > candidate-evidence/target/rust-version.txt
          (cargo --version || echo unavailable) > candidate-evidence/target/cargo-version.txt
          node --input-type=module -e '
            import { createHash } from "node:crypto";
            import { readFileSync, writeFileSync } from "node:fs";
            import { release, version } from "node:os";
            const digest = (path) => createHash("sha256").update(readFileSync(path)).digest("hex");
            const captured = (name) => readFileSync(`candidate-evidence/target/${name}-version.txt`, "utf8").trim();
            const root = JSON.parse(readFileSync("package.json", "utf8"));
            const record = {
              schemaVersion: 1,
              candidateId: process.env.CANDIDATE_ID,
              channel: process.env.CANDIDATE_CHANNEL,
              commit: process.env.GITHUB_SHA,
              sourceDateEpoch: Number(process.env.SOURCE_DATE_EPOCH),
              target: { platform: process.env.TARGET_PLATFORM, arch: process.env.TARGET_ARCH },
              runner: { os: process.env.RUNNER_OS, arch: process.env.RUNNER_ARCH, image: process.env.ImageOS ?? "unknown", imageVersion: process.env.ImageVersion ?? "unknown" },
              environment: { osRelease: release(), osVersion: version(), node: captured("node"), npm: captured("npm"), rust: captured("rust"), cargo: captured("cargo"), tauri: root.devDependencies["@tauri-apps/cli"] },
              locks: [
                { path: "apps/desktop/src-tauri/Cargo.lock", sha256: digest("apps/desktop/src-tauri/Cargo.lock") },
                { path: "package-lock.json", sha256: digest("package-lock.json") }
              ],
              conclusion: process.env.JOB_STATUS,
              signing: "not-performed"
            };
            writeFileSync("candidate-evidence/target/environment.json", `${JSON.stringify(record, null, 2)}\n`, { flag: "wx" });
          '

      - name: Retain target evidence and unsigned package
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unsigned-candidate-${{ inputs.candidate_id }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.run_attempt }}
          path: |
            candidate-evidence/target
            apps/desktop/src-tauri/target/release/bundle
          if-no-files-found: warn
          retention-days: 90
