name: ${NEXA_COMPOSE_PROJECT_NAME:-nexa-chat-production}

x-cloudflared: &cloudflared
  image: cloudflare/cloudflared:2026.7.2@sha256:4f6655284ab3d252b7f28fedb19fe6c8fc82ee5b1295c20ac74d475e5398a52d
  profiles: [cloudflare]
  init: true
  user: '65532:65532'
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  restart: unless-stopped
  command:
    - tunnel
    - --metrics
    - 0.0.0.0:2000
    - --loglevel
    - info
    - --transport-loglevel
    - warn
    - --output
    - json
    - run
    - --token-file
    - /run/secrets/cloudflare_tunnel_token
  secrets: [cloudflare_tunnel_token, tunnel_origin_ca]
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,uid=65532,gid=65532,mode=0700,size=4m
  depends_on:
    edge: { condition: service_healthy }
  healthcheck:
    test:
      [
        CMD,
        cloudflared,
        --no-autoupdate,
        tunnel,
        --metrics,
        0.0.0.0:2000,
        ready,
      ]
    interval: 10s
    timeout: 3s
    retries: 6
    start_period: 30s
  stop_signal: SIGTERM
  stop_grace_period: 30s
  pids_limit: 100
  ulimits:
    nofile: { soft: 4096, hard: 8192 }
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '5'
  deploy:
    resources:
      limits: { cpus: '1.00', memory: 512M, pids: 100 }
      reservations: { cpus: '0.10', memory: 64M }

services:
  edge:
    build:
      target: edge-cloudflare-runtime
    ports: !reset []
    networks:
      tunnel:
        ipv4_address: 172.29.0.4
      frontend:
        ipv4_address: ${NEXA_EDGE_ADDRESS:-172.30.0.10}
    healthcheck:
      test:
        [
          CMD,
          wget,
          --quiet,
          --tries=1,
          --spider,
          http://127.0.0.1:8080/health/live,
        ]

  cloudflared-a:
    <<: *cloudflared
    networks:
      tunnel:
        ipv4_address: 172.29.0.2

  cloudflared-b:
    <<: *cloudflared
    networks:
      tunnel:
        ipv4_address: 172.29.0.3

networks:
  tunnel:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/29

secrets:
  cloudflare_tunnel_token:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/cloudflare_tunnel_token
  tunnel_origin_ca:
    file: ${NEXA_SECRET_DIR:?set NEXA_SECRET_DIR to an absolute directory}/tunnel_origin_ca.pem
