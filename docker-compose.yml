name: nexa-chat
services:
  postgres:
    image: postgres:17.9-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
    environment:
      POSTGRES_DB: nexa
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD: local-development-password
    ports: ['${POSTGRES_PUBLISHED_PORT:-5432}:5432']
    volumes: ['postgres-data:/var/lib/postgresql/data']
    healthcheck:
      {
        test: ['CMD-SHELL', 'pg_isready -U nexa -d nexa'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
  redis:
    image: valkey/valkey:8.1.3-alpine@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    command: ['valkey-server', '--appendonly', 'yes']
    ports: ['${VALKEY_PUBLISHED_PORT:-6379}:6379']
    volumes: ['redis-data:/data']
    healthcheck:
      {
        test: ['CMD', 'valkey-cli', 'ping'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
  object-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: nexa-local
      MINIO_ROOT_PASSWORD: change-this-local-secret
    ports:
      - '${MINIO_API_PUBLISHED_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PUBLISHED_PORT:-9001}:9001'
    volumes: ['object-data:/data']
    healthcheck:
      {
        test: ['CMD', 'mc', 'ready', 'local'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
volumes:
  postgres-data:
  redis-data:
  object-data:
