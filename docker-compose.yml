name: nexa-chat
services:
  postgres:
    image: postgres:17.10-alpine3.23@sha256:8189a1f6e40904781fc9e2612687877791d21679866db58b1de996b31fc312e4
    environment:
      POSTGRES_DB: nexa
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD: local-development-password
    ports:
      - target: 5432
        published: '${POSTGRES_PUBLISHED_PORT:-5432}'
        host_ip: '${NEXA_DEVELOPMENT_BIND_ADDRESS:-127.0.0.1}'
        protocol: tcp
    volumes: ['postgres-data:/var/lib/postgresql/data']
    healthcheck:
      {
        test: ['CMD-SHELL', 'pg_isready -U nexa -d nexa'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
  redis:
    image: valkey/valkey:8.1.9-alpine3.24@sha256:a038175878d66b9d274fbf8be73c0305e93798b83917647f167e18cef3c71eec
    command: ['valkey-server', '--appendonly', 'yes']
    ports:
      - target: 6379
        published: '${VALKEY_PUBLISHED_PORT:-6379}'
        host_ip: '${NEXA_DEVELOPMENT_BIND_ADDRESS:-127.0.0.1}'
        protocol: tcp
    volumes: ['redis-data:/data']
    healthcheck:
      {
        test: ['CMD', 'valkey-cli', 'ping'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
  object-storage:
    image: chrislusf/seaweedfs:4.40@sha256:52194fba4fecd0083c842158b3a902ba6e04a63619b2b0efcd08007bdb6a4602
    command: ['mini', '-dir=/data', '-bucket=nexa-attachments']
    environment:
      AWS_ACCESS_KEY_ID: nexa-local
      AWS_SECRET_ACCESS_KEY: change-this-local-secret
      S3_BUCKET: nexa-attachments
    ports:
      - target: 8333
        published: '${S3_PUBLISHED_PORT:-8333}'
        host_ip: '${NEXA_DEVELOPMENT_BIND_ADDRESS:-127.0.0.1}'
        protocol: tcp
    volumes: ['object-data:/data']
    healthcheck:
      {
        test:
          ['CMD', 'wget', '--spider', '-q', 'http://localhost:8333/healthz'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
volumes:
  postgres-data:
  redis-data:
  object-data:
