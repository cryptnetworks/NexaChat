name: nexa-chat
services:
  postgres:
    image: postgres:17.5-alpine@sha256:6c2cae3e6bebe7f1a37b5909c4d9ad1a8b82c03a8e1bb4a02ca21967267f5c95
    environment:
      POSTGRES_DB: nexa
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD: nexa-local-only
    ports: ['5432:5432']
    volumes: ['postgres-data:/var/lib/postgresql/data']
    healthcheck:
      {
        test: ['CMD-SHELL', 'pg_isready -U nexa -d nexa'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
  redis:
    image: valkey/valkey:8.1.3-alpine@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    command: ['valkey-server', '--appendonly', 'yes']
    ports: ['6379:6379']
    volumes: ['redis-data:/data']
    healthcheck:
      {
        test: ['CMD', 'valkey-cli', 'ping'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
  object-storage:
    image: chrislusf/seaweedfs:4.38@sha256:e1ee85a3089d96c4f3df699a0944468557813f5df306819c9d368c4039070ddf
    environment:
      AWS_ACCESS_KEY_ID: local-development-access-key
      AWS_SECRET_ACCESS_KEY: local-development-secret-key
      S3_BUCKET: nexa-attachments
    ports: ['9000:8333']
    volumes: ['seaweedfs-data:/data']
    healthcheck:
      {
        test:
          ['CMD', 'wget', '--spider', '-q', 'http://localhost:8333/healthz'],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }
    restart: unless-stopped
volumes:
  postgres-data:
  redis-data:
  seaweedfs-data:
