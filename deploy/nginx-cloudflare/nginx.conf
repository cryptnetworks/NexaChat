worker_processes auto;
pid /tmp/nginx.pid;

error_log /dev/stderr emerg;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format safe '$request_method $status $body_bytes_sent $request_time';
  access_log /dev/stdout safe;

  server_tokens off;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 30s;
  keepalive_requests 1000;
  client_body_timeout 15s;
  client_header_timeout 15s;
  client_max_body_size 16k;
  send_timeout 30s;
  reset_timedout_connection on;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path /tmp/proxy;
  fastcgi_temp_path /tmp/fastcgi;
  uwsgi_temp_path /tmp/uwsgi;
  scgi_temp_path /tmp/scgi;

  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  map $realip_remote_addr $nexa_tunnel_peer {
    default 0;
    172.29.0.2 1;
    172.29.0.3 1;
  }

  map "$nexa_tunnel_peer:$http_cf_connecting_ip" $nexa_tunnel_request {
    default 0;
    "~^1:[0-9A-Fa-f:.]{2,45}$" 1;
  }

  set_real_ip_from 172.29.0.2;
  set_real_ip_from 172.29.0.3;
  real_ip_header CF-Connecting-IP;
  real_ip_recursive off;

  server {
    listen 127.0.0.1:8080;
    access_log off;

    location = /health/live {
      set $nexa_server http://server:3000;
      proxy_pass $nexa_server;
      include /etc/nginx/nexa-proxy.conf;
    }

    location / {
      return 404;
    }
  }

  server {
    listen 8443 ssl default_server;
    listen [::]:8443 ssl default_server;
    server_name _;

    if ($nexa_tunnel_request = 0) {
      return 403;
    }

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /run/secrets/tls_cert;
    ssl_certificate_key /run/secrets/tls_key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:TLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; connect-src 'self' wss:; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'" always;
    add_header Permissions-Policy 'camera=(), display-capture=(), geolocation=(), microphone=(), payment=(), usb=()' always;
    add_header Referrer-Policy 'no-referrer' always;
    add_header Strict-Transport-Security 'max-age=31536000' always;
    add_header X-Content-Type-Options 'nosniff' always;
    add_header X-Frame-Options 'DENY' always;

    location = /metrics {
      return 404;
    }

    location = /health/live {
      set $nexa_server http://server:3000;
      proxy_pass $nexa_server;
      include /etc/nginx/nexa-proxy.conf;
    }

    location = /health/startup {
      set $nexa_server http://server:3000;
      proxy_pass $nexa_server;
      include /etc/nginx/nexa-proxy.conf;
    }

    location = /health/ready {
      set $nexa_server http://server:3000;
      proxy_pass $nexa_server;
      include /etc/nginx/nexa-proxy.conf;
    }

    location = /v1/realtime {
      set $nexa_server http://server:3000;
      proxy_pass $nexa_server;
      include /etc/nginx/nexa-proxy.conf;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Upgrade $http_upgrade;
    }

    location /v1/ {
      set $nexa_server http://server:3000;
      proxy_pass $nexa_server;
      include /etc/nginx/nexa-proxy.conf;
    }

    location = /index.html {
      expires -1;
      try_files $uri =404;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
